title: FDE 采恪智创
description: A starter template for a Jeykll site using the Just the Docs theme!
theme: just-the-docs

# 自定义域名：站点在根路径提供，baseurl 留空
url: https://fde.usingnow.tech
baseurl: ""

logo: "/assets/images/logo.png"
favicon_ico: "/assets/images/favicon.ico"
tagline: "采恪智创 / UsingNow·AI"

aux_links:
  Repository: https://github.com/usingnow/fde

# Callouts：https://just-the-docs.com/docs/configuration/#callouts
# 在 Markdown 段落上加 kramdown 属性，例如：{: .warning }
# quiet：浅色主题下外边框用 -000 色阶（更柔和）
callouts_level: quiet
callouts:
  highlight:
    title: 提示 / INFORMATION
    color: yellow
  important:
    title: 重要 / IMPORTANT
    color: blue
  new:
    title: 新功能 / NEW FEATURE
    color: green
  note:
    title: 说明 / NOTE
    color: purple
  warning:
    title: 警告 / WARNING
    color: red

# Footer content
# appears at the bottom of every page's main content
# Note: The footer_content option is deprecated and will be removed in a future major release. Please use `_includes/footer_custom.html` for more robustmarkup / liquid-based content.
footer_content: "Copyright &copy; 2010-2026 采恪智创 / UsingNow·AI. Distributed by an <a href=\"https://github.com/just-the-docs/just-the-docs/tree/main/LICENSE.txt\">MIT license.</a>"

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

# Footer "Edit this page on GitHub" link text
gh_edit_link: true # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/just-the-docs/just-the-docs" # the github URL for your repo
gh_edit_branch: "main" # the branch that your docs is served from
# gh_edit_source: docs # the source that your files originate from
gh_edit_view_mode: "tree" # "tree" or "edit" if you want the user to jump into the editor immediately
